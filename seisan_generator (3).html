<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>精算ジェネレーター</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #e879a0;
    --text: #e8e8f0;
    --text2: #8888a8;
    --text3: #444460;
    --success: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
    max-width: 600px;
    margin: 0 auto;
  }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 17px; font-weight: 700; color: var(--text); }
  .header p { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text2); }
  .field input, .field select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 14px; padding: 9px 10px; outline: none; width: 100%;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Courier New', monospace;
    font-size: 13px; line-height: 1.7; padding: 10px; resize: vertical;
    outline: none; min-height: 180px;
  }
  textarea:focus { border-color: var(--accent); }
  .btn-generate {
    width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-family: inherit; font-size: 15px;
    font-weight: 700; cursor: pointer; margin-top: 10px; letter-spacing: 0.03em;
  }
  .btn-generate:active { opacity: 0.8; }
  .btn-clear {
    width: 100%; padding: 10px; background: transparent; color: var(--text2);
    border: 1px solid var(--border); border-radius: 10px; font-family: inherit;
    font-size: 13px; cursor: pointer; margin-top: 8px;
  }
  .output-area {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace;
    font-size: 13px; line-height: 1.9; white-space: pre-wrap;
    word-break: break-all; min-height: 120px; color: var(--text);
    user-select: all; -webkit-user-select: all;
  }
  .btn-copy {
    width: 100%; padding: 12px; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
  }
  .btn-copy.copied { border-color: var(--success); color: var(--success); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--text2); }
  .stat-val { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .stat-val.a1 { color: var(--accent); }
  .stat-val.a2 { color: var(--accent2); }
  .error {
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; color: #f87171; font-size: 12px; padding: 8px 12px; margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>精算ジェネレーター</h1>
  <p>予約情報 → 女の子への精算LINEを自動生成</p>
</div>

<div class="card">
  <div class="card-title">設定</div>
  <div class="row2">
    <div class="field">
      <label>セラピスト名</label>
      <input id="therapist" placeholder="例: 綾瀬るな" />
    </div>
    <div class="field">
      <label>日付</label>
      <input id="date" placeholder="例: 4/21(火)" />
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>雑費（本指名あり→自動0円）</label>
      <input id="zatsuhi" type="number" value="1000" />
    </div>
    <div class="field">
      <label>送金方法</label>
      <select id="payment">
        <option value="PayPayまたは振込にて送金お願い致します🙂‍↕️">PayPay or 振込</option>
        <option value="振込にて送金お願い致します🙂‍↕️">振込のみ</option>
        <option value="PayPayにて送金お願い致します🙂‍↕️">PayPayのみ</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">予約情報を貼り付け</div>
  <textarea id="input" placeholder="■お名前：佐藤　大輔1024様
■来店歴：新規
━━━━━━━━━━━━━━
★ご予約内容
━━━━━━━━━━━━━━
■ご希望コース：異次元コース(70分)
■オプション：
リンパドレナージュ10分1,000
衣装チェンジ2,000
写真1,000
合計:20,000
---------------------------------
■お名前：ヤマナカ8898様
..."></textarea>
  <div id="error-area"></div>
  <button class="btn-generate" onclick="generate()">精算を生成</button>
  <button class="btn-clear" onclick="clearAll()">クリア</button>
</div>

<div class="card" id="result-card" style="display:none">
  <div class="card-title">生成された精算</div>
  <div class="output-area" id="output"></div>
  <button class="btn-copy" id="copy-btn" onclick="copyOutput()">LINEにコピー</button>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">件数</div>
      <div class="stat-val" id="s-count">-</div>
    </div>
    <div class="stat">
      <div class="stat-label">女子給合計</div>
      <div class="stat-val a1" id="s-joshi">-</div>
    </div>
    <div class="stat">
      <div class="stat-label">店落ち合計</div>
      <div class="stat-val a2" id="s-mise">-</div>
    </div>
  </div>
</div>

<script>
const COURSE_PRICES = {
  standard: { 70:15000, 90:18000, 120:24000, 150:30000, 180:36000 },
  isekai:   { 70:16000, 90:19000, 120:25000, 150:31000, 180:37000 },
};
const OP_KEYWORDS = ['リンパ','衣装チェンジ','たっぷりオイル','オイル増量','パウダーマッサージ','パウダー','神泡ホイップ','ホイップ'];

function num(s) { return parseInt(String(s||'').replace(/[,，￥¥\s]/g,''))||0; }
function fmt(n) { return n.toLocaleString('ja-JP'); }

function calcJoshi(courseType, minutes, opTotal, shimei, enchoCount) {
  const base = minutes / 10 * 1000;
  const courseJoshi = courseType === 'isekai' ? base + 1000 : base;
  return courseJoshi + opTotal + (enchoCount * 2000) + shimei;
}

function parseYoyaku(text) {
  const blocks = text.split(/(?=■お名前：)/);
  const customers = [];
  for (const block of blocks) {
    if (!block.includes('■お名前：')) continue;
    const nameM = block.match(/■お名前：(.+?)(\d{4})様/);
    if (!nameM) continue;
    const name = nameM[1].trim();
    const custNum = nameM[2];

    const courseM = block.match(/■ご希望コース：(.+)/);
    let courseType = 'standard', minutes = 70;
    if (courseM) {
      if (/異次元/.test(courseM[1])) courseType = 'isekai';
      const mM = courseM[1].match(/(\d+)分/);
      if (mM) minutes = parseInt(mM[1]);
    }
    const coursePrice = COURSE_PRICES[courseType][minutes] || 0;

    let shimei = 0, shimeiLabel = '';
    if (/本指名/.test(block)) { shimei = 2000; shimeiLabel = '本指名2,000'; }
    else if (/写真/.test(block)) { shimei = 1000; shimeiLabel = '写真指名1,000'; }

    let enchoCount = 0, enchoTotal = 0;
    for (const e of (block.match(/延長(\d+)分[\s　]*([\d,]+)/g)||[])) {
      const em = e.match(/延長(\d+)分[\s　]*([\d,]+)/);
      if (em) { enchoCount += parseInt(em[1])/15; enchoTotal += num(em[2]); }
    }

    let opTotal = 0;
    for (const ln of block.split('\n')) {
      if (!OP_KEYWORDS.some(kw => ln.includes(kw))) continue;
      const amounts = (ln.match(/([\d,]+)/g)||[]).map(num).filter(v => v>=500 && v<=50000);
      if (amounts.length > 0) opTotal += amounts[amounts.length-1];
    }

    let waribiki = 0;
    const wm = block.match(/(\d+)千円割引|([\d,]+)円?割引|割引([\d,]+)/);
    if (wm) waribiki = wm[1] ? parseInt(wm[1])*1000 : num(wm[2]||wm[3]);

    customers.push({ name, custNum, courseType, minutes, coursePrice, shimei, shimeiLabel, enchoCount, enchoTotal, opTotal, waribiki });
  }
  return customers;
}

function generate() {
  clearError();
  const raw = document.getElementById('input').value;
  if (!raw.trim()) { showError('予約情報を貼り付けてください'); return; }

  const zatsuhiBase = num(document.getElementById('zatsuhi').value) || 1000;
  const payment = document.getElementById('payment').value;
  const customers = parseYoyaku(raw);

  if (customers.length === 0) {
    showError('予約情報が読み取れませんでした。\n■お名前：NAME9999様 の形式か確認してください。');
    return;
  }

  const hasHonshimei = customers.some(c => c.shimei === 2000);
  const isOne = customers.length === 1;
  let lines = [];
  lines.push('お疲れ様です❣️');
  lines.push('下記本日のご精算ですので、ご確認をお願いいたします🙂‍↕️');

  let totalJoshi = 0, totalMise = 0;

  customers.forEach((c, i) => {
    const joshi = calcJoshi(c.courseType, c.minutes, c.opTotal, c.shimei, c.enchoCount);
    const gross = c.coursePrice + c.enchoTotal + c.shimei + c.opTotal;
    const mise = gross - joshi - c.waribiki;
    totalJoshi += joshi;
    totalMise += mise;

    lines.push('');
    lines.push(isOne ? `■${c.name}${c.custNum}様` : `■${i+1}件目${c.name}${c.custNum}様`);
    lines.push(`${c.courseType==='isekai'?'異次元':''}${c.minutes}分${fmt(c.coursePrice)}`);
    if (c.enchoTotal > 0) lines.push(`延長${c.enchoCount*15}分${fmt(c.enchoTotal)}`);
    if (c.shimeiLabel) lines.push(c.shimeiLabel);
    if (c.opTotal > 0) lines.push(`OP${fmt(c.opTotal)}`);
    if (c.waribiki > 0) lines.push(`割引${fmt(c.waribiki)}`);
    lines.push('━━━━━━━━');
    lines.push(`女子給${fmt(joshi)}`);
    lines.push(`店落ち${fmt(mise)}`);
  });

  lines.push('');
  lines.push('━━━━━━━━');
  if (hasHonshimei) {
    lines.push('御本指様ありの為、雑費無しになります🫧');
  } else {
    totalJoshi -= zatsuhiBase;
    totalMise += zatsuhiBase;
    lines.push(`雑費${fmt(zatsuhiBase)}`);
  }
  lines.push('');
  lines.push(`本日の店落ち【${fmt(totalMise)}】円になります🙏`);
  lines.push('');
  lines.push(payment);

  document.getElementById('output').textContent = lines.join('\n');
  document.getElementById('s-count').textContent = customers.length + '件';
  document.getElementById('s-joshi').textContent = '¥' + fmt(totalJoshi);
  document.getElementById('s-mise').textContent = '¥' + fmt(totalMise);
  document.getElementById('result-card').style.display = 'block';
  setTimeout(() => document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  if (!text) return;
  const btn = document.getElementById('copy-btn');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => flashCopy(btn));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    flashCopy(btn);
  }
}

function flashCopy(btn) {
  btn.textContent = 'コピーしました！';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'LINEにコピー'; btn.classList.remove('copied'); }, 2000);
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('result-card').style.display = 'none';
  clearError();
}
function showError(msg) { document.getElementById('error-area').innerHTML = `<div class="error">${msg}</div>`; }
function clearError() { document.getElementById('error-area').innerHTML = ''; }
</script>
</body>
</html>
